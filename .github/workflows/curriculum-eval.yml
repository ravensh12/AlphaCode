name: Scheduled curriculum evaluation

on:
  schedule:
    - cron: '23 8 * * 1'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  curriculum-release:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Use Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install locked dependencies
        run: npm ci

      - name: Evaluate all curriculum quality gates
        env:
          CURRICULUM_EVAL_REPORT: '1'
        run: npm run test:curriculum

      - name: Require all oracles and kill all mutants
        env:
          CURRICULUM_EVAL_REPORT: '1'
          NEETCODE_ORACLE_RELEASE: '1'
        run: npm run test:oracles

      - name: Check pinned and problem links
        if: always()
        continue-on-error: true
        run: npm run curriculum:check-links -- --all-problems
